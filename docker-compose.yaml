version: '3.9'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      # Эти переменные окружения будут использованы для инициализации PostgreSQL
      POSTGRES_DB: myprojectdb
      POSTGRES_USER: myprojectuser
      POSTGRES_PASSWORD: myprojectpass
    volumes:
      # Создаем том для сохранения данных базы данных между перезапусками
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Пробрасываем порт, чтобы можно было подключиться к БД извне (опционально)
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      # Монтируем текущую директорию, чтобы код обновлялся без пересборки
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      # Передаем в контейнер с Django переменные для подключения к БД
      DB_NAME: myprojectdb
      DB_USER: myprojectuser
      DB_PASSWORD: myprojectpass
      DB_HOST: db  # 'db' — это имя сервиса в docker-compose
      DB_PORT: 5432

volumes:
  postgres_data: