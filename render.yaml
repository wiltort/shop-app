services:
  - type: web
    name: shop-app
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install poetry
      poetry self add poetry-plugin-dotenv
      poetry config virtualenvs.create false
      poetry install --no-interaction --no-ansi --without dev --with stage
      python src/manage.py collectstatic --noinput
    startCommand: |
      python src/manage.py migrate --noinput && \
      python src/manage.py createsuperuser --noinput --username $ADMIN_USERNAME --email $ADMIN_EMAIL || true && \
      gunicorn shop_app.wsgi:application --chdir src --bind 0.0.0.0:$PORT --workers 3
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: DJANGO_SETTINGS_MODULE
        value: shop_app.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: shop-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "3"
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
    healthCheckPath: /admin/login/

databases:
  - name: shop-db
    region: oregon
    plan: free
